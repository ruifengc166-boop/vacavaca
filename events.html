<!-- 首页视差微动效 -->
<style>
.hero{overflow:hidden}
.hero-bg{transition:transform 0.08s ease-out;will-change:transform}
</style>
<script>
(function(){
  var hero = document.querySelector('.hero');
  var bg = document.querySelector('.hero-bg');
  if (!hero || !bg) return;
  var maxMove = 20;
  hero.addEventListener('mousemove', function(e){
    var rect = hero.getBoundingClientRect();
    var x = (e.clientX - rect.left) / rect.width;
    var y = (e.clientY - rect.top) / rect.height;
    var moveX = (0.5 - x) * maxMove;
    var moveY = (0.5 - y) * maxMove;
    bg.style.transform = 'translate(' + moveX.toFixed(1) + 'px, ' + moveY.toFixed(1) + 'px)';
  });
  hero.addEventListener('mouseleave', function(){
    bg.style.transform = 'translate(0, 0)';
  });
})();
</script>
