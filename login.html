<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - VACAT</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body style="background:#000">
<div class="navbar"><div class="container"><a class="logo" href="index.html"><img src="/assets/logo/nav-logo.png" alt="VACAT" style="height:24px;width:auto;display:block;vertical-align:middle"></a><div class="nav-links"><a href="index.html">发现</a><a href="creators.html">创作人</a><a href="works.html">作品</a><a href="vacat.html">瓦卡奖</a><a href="events.html">活动</a><a href="referral.html">引荐</a></div><div class="nav-actions"><a href="login.html" class="btn-nav">登录</a><a href="register.html" class="btn-reg">注册</a></div><div class="nav-toggle"><span></span><span></span><span></span></div></div></div>
<div class="auth-page" style="background:url(/uploads/1782115205667-0kq2gv.png) center/cover no-repeat;position:relative"><div class="auth-card" style="background:rgba(24,24,24,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08)"><h2 data-c="auth.login_title">欢迎回来</h2><p class="sub" data-c="auth.login_subtitle">登录你的创作者账号</p><form id="loginForm"><div class="form-group"><label data-c="auth.login_email_label">邮箱</label><input type="email" id="login_email" placeholder="your@email.com" required></div><div class="form-group"><label data-c="auth.login_password_label">密码</label><input type="password" id="login_password" placeholder="输入密码" required></div><button type="submit" class="btn btn-primary btn-lg btn-block" data-c="auth.login_button">登录</button></form><div class="footer"><span data-c="auth.login_footer">还没有账号？</span><a href="register.html" data-c="auth.login_footer_link">注册</a></div></div></div>
<script src="js/content-loader.js?v=2"></script>
<script src="js/main.js?v=2"></script>

<script>
(function(){
var p=document.querySelector(".auth-page");if(!p)return;
var maxMove=25,tx=0,ty=0,px=0,py=0;
function anim(){
px+=(tx-px)*0.08;py+=(ty-py)*0.08;
p.style.backgroundPosition=(50+px)+"% "+(50+py)+"%";
requestAnimationFrame(anim);
}
anim();
p.addEventListener("mousemove",function(e){
tx=(e.clientX/window.innerWidth-0.5)*maxMove;
ty=(e.clientY/window.innerHeight-0.5)*maxMove;
});
p.addEventListener("mouseleave",function(){tx=0;ty=0;});
})();
</script>
</body>
</html>
