<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Remix Studio Admin - VACAVACA</title>
<style>
:root{--bg:#0A0A0A;--card:#1A1A1A;--input:#111;--gold:#cafe61;--text:#fff;--muted:#9CA3AF;--border:rgba(255,255,255,.08)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.wrap{max-width:1280px;margin:0 auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{color:var(--gold);font-size:22px;font-weight:800}.tabs{display:flex;gap:8px;margin:16px 0}.tab{padding:9px 16px;border:1px solid var(--border);border-radius:999px;color:var(--muted);cursor:pointer}.tab.active{color:#000;background:var(--gold);border-color:var(--gold);font-weight:700}.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}input,select,textarea{width:100%;padding:9px 10px;background:var(--input);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text)}textarea{min-height:78px;resize:vertical}button{border:none;border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:700}.btn{background:var(--gold);color:#000}.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-danger{background:rgba(239,68,68,.16);color:#ef4444;border:1px solid rgba(239,68,68,.28)}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;vertical-align:top}th{color:var(--muted);font-size:12px}.muted{color:var(--muted);font-size:12px}.row-actions{display:flex;gap:6px;flex-wrap:wrap}.hidden{display:none!important}.login{max-width:420px;margin:100px auto}.pill{display:inline-block;border-radius:999px;padding:3px 8px;background:rgba(202,254,97,.08);color:var(--gold);font-size:11px}@media(max-width:900px){.grid,.form-grid{grid-template-columns:1fr}.top{display:block}.tabs{flex-wrap:wrap}table{font-size:12px}}
</style>
</head>
<body>
<div class="wrap">
  <div id="loginBox" class="login card"><h2 style="color:var(--gold);margin-bottom:8px">Ad Remix Studio Admin</h2><p class="muted" style="margin-bottom:16px">登录后管理 Ad Remix Studio 的订单和广告模板。</p><label>管理员邮箱</label><input id="loginEmail" value="admin@vacat.cc"><label style="margin-top:10px">密码</label><input id="loginPassword" type="password"><button class="btn" style="width:100%;margin-top:14px" onclick="login()">登录</button><div id="loginMsg" class="muted" style="margin-top:10px"></div></div>
  <div id="app" class="hidden">
    <div class="top"><div><div class="brand">VACAVACA Ad Remix Studio Admin</div><div class="muted">Orders / Templates for Ad Remix Studio MVP</div></div><div class="row-actions"><a href="/admin/" class="btn-ghost" style="text-decoration:none;padding:8px 14px;border-radius:999px">CMS后台</a><a href="/studio.html" class="btn-ghost" style="text-decoration:none;padding:8px 14px;border-radius:999px">前台Studio</a><button class="btn-ghost" onclick="logout()">退出</button></div></div>
    <div class="tabs"><button class="tab active" id="tabOrders" onclick="showTab('orders')">Orders</button><button class="tab" id="tabTemplates" onclick="showTab('templates')">Templates</button></div>
    <section id="ordersPane"><div class="grid"><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3>订单列表</h3><button class="btn-ghost" onclick="loadOrders()">刷新</button></div><div style="overflow:auto"><table><thead><tr><th>ID</th><th>公司/产品</th><th>模板</th><th>预算</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="ordersBody"></tbody></table></div></div><div class="card"><h3>订单详情</h3><div id="orderDetail" class="muted" style="margin-top:12px">请选择左侧订单。</div></div></div></section>
    <section id="templatesPane" class="hidden"><div class="grid"><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3>模板列表</h3><button class="btn-ghost" onclick="loadTemplates()">刷新</button></div><div style="overflow:auto"><table><thead><tr><th>ID</th><th>标题</th><th>行业</th><th>价格</th><th>状态</th><th>排序</th><th>操作</th></tr></thead><tbody id="templatesBody"></tbody></table></div></div><div class="card"><h3 id="templateFormTitle">新增模板</h3><div class="form-grid" style="margin-top:12px"><div><label>Title</label><input id="tpl_title"></div><div><label>Status</label><select id="tpl_status"><option>published</option><option>draft</option><option>hidden</option></select></div><div><label>Industry</label><input id="tpl_industry"></div><div><label>Style tags</label><input id="tpl_style_tags" placeholder="luxury, cinematic"></div><div><label>Cover image URL</label><input id="tpl_cover_image"></div><div><label>Preview video URL</label><input id="tpl_preview_video_url"></div><div><label>Duration</label><input id="tpl_duration" placeholder="15s"></div><div><label>Aspect ratio</label><input id="tpl_aspect_ratio" placeholder="9:16"></div><div><label>Base price</label><input id="tpl_base_price" placeholder="From $499"></div><div><label>Turnaround</label><input id="tpl_turnaround" placeholder="5-7 days"></div><div><label>Difficulty</label><input id="tpl_difficulty" placeholder="medium"></div><div><label>Sort order</label><input id="tpl_sort_order" type="number" value="99"></div></div><label style="margin-top:10px">Description</label><textarea id="tpl_description"></textarea><div class="row-actions" style="margin-top:12px"><button class="btn" onclick="saveTemplate()">保存模板</button><button class="btn-ghost" onclick="resetTemplateForm()">清空</button></div></div></div></section>
  </div>
</div>
<script>
var token=localStorage.getItem('admin_token')||'';var orders=[],templates=[],editingTemplateId=null;
function headers(json){var h={};if(json)h['Content-Type']='application/json';if(token)h.Authorization='Bearer '+token;return h}
function api(path,opts){opts=opts||{};opts.headers=Object.assign(headers(opts.body&&!(opts.body instanceof FormData)),opts.headers||{});return fetch(path,opts).then(function(r){return r.json()})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function login(){api('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('loginEmail').value,password:document.getElementById('loginPassword').value})}).then(function(d){if(d.token&&d.user&&d.user.role==='admin'){token=d.token;localStorage.setItem('admin_token',token);boot()}else document.getElementById('loginMsg').textContent=d.error||'需要管理员账号';})}
function logout(){localStorage.removeItem('admin_token');location.reload()}
function boot(){document.getElementById('loginBox').classList.add('hidden');document.getElementById('app').classList.remove('hidden');loadOrders();loadTemplates()}
if(token){fetch('/api/profile',{headers:{Authorization:'Bearer '+token}}).then(function(r){return r.json()}).then(function(d){if(d.role==='admin')boot();else localStorage.removeItem('admin_token')}).catch(function(){})}
function showTab(name){document.getElementById('ordersPane').classList.toggle('hidden',name!=='orders');document.getElementById('templatesPane').classList.toggle('hidden',name!=='templates');document.getElementById('tabOrders').classList.toggle('active',name==='orders');document.getElementById('tabTemplates').classList.toggle('active',name==='templates')}
function loadOrders(){api('/api/orders/admin/orders').then(function(data){orders=Array.isArray(data)?data:[];var body=document.getElementById('ordersBody');body.innerHTML=orders.map(function(o){return '<tr><td>#'+o.id+'</td><td><strong>'+esc(o.company)+'</strong><div class="muted">'+esc(o.product_name||o.product_url)+'</div></td><td>'+esc(o.template_title||'-')+'</td><td>'+esc(o.budget||'-')+'</td><td><span class="pill">'+esc(o.status)+'</span></td><td class="muted">'+esc((o.created_at||'').slice(0,10))+'</td><td><button class="btn-ghost" onclick="viewOrder('+o.id+')">查看</button></td></tr>'}).join('')||'<tr><td colspan="7" class="muted">暂无订单</td></tr>'})}
function viewOrder(id){api('/api/orders/admin/orders/'+id).then(function(o){var notes=(o.internal_notes||[]).map(function(n){return '<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:8px">'+esc(n.text)+'<div class="muted">'+esc(n.created_at||'')+'</div></div>'}).join('');document.getElementById('orderDetail').innerHTML='<div class="form-grid"><div><label>Status</label><select id="od_status"><option>new</option><option>qualified</option><option>quoted</option><option>confirmed</option><option>in_production</option><option>review</option><option>delivered</option><option>closed</option><option>lost</option></select></div><div><label>Assigned to</label><input id="od_assigned" value="'+esc(o.assigned_to||'')+'"></div><div><label>Budget</label><input id="od_budget" value="'+esc(o.budget||'')+'"></div><div><label>Timeline</label><input id="od_timeline" value="'+esc(o.timeline||'')+'"></div></div><div style="margin-top:10px"><strong>'+esc(o.company)+'</strong><div class="muted">'+esc(o.contact_name)+' · '+esc(o.email)+' · '+esc(o.whatsapp||o.wechat||'')+'</div><p style="margin-top:10px;color:var(--muted);line-height:1.6">'+esc(o.product_description||'')+'</p><p class="muted">Product: '+esc(o.product_name||'')+' '+esc(o.product_url||'')+'</p><p class="muted">Platforms: '+esc((o.target_platform||[]).join(', '))+'</p><p class="muted">Assets: '+esc((o.asset_urls||[]).join(', '))+'</p></div><label style="margin-top:10px">Delivery URLs, comma separated</label><textarea id="od_delivery">'+esc((o.delivery_urls||[]).join(', '))+'</textarea><label style="margin-top:10px">New internal note</label><textarea id="od_note"></textarea><div class="row-actions" style="margin-top:12px"><button class="btn" onclick="saveOrder('+o.id+')">保存订单</button><button class="btn-danger" onclick="deleteOrder('+o.id+')">删除</button></div><div style="margin-top:12px"><h4>Internal Notes</h4>'+notes+'</div>';document.getElementById('od_status').value=o.status||'new'})}
function saveOrder(id){api('/api/orders/admin/orders/'+id,{method:'PUT',body:JSON.stringify({status:document.getElementById('od_status').value,assigned_to:document.getElementById('od_assigned').value,budget:document.getElementById('od_budget').value,timeline:document.getElementById('od_timeline').value,delivery_urls:document.getElementById('od_delivery').value,internal_note:document.getElementById('od_note').value})}).then(function(d){if(d.success){loadOrders();viewOrder(id)}else alert(d.error||'保存失败')})}
function deleteOrder(id){if(!confirm('确定删除订单？'))return;api('/api/orders/admin/orders/'+id,{method:'DELETE'}).then(function(d){if(d.success){loadOrders();document.getElementById('orderDetail').textContent='请选择左侧订单。'}})}
function loadTemplates(){api('/api/templates/admin/templates').then(function(data){templates=Array.isArray(data)?data:[];var body=document.getElementById('templatesBody');body.innerHTML=templates.map(function(t){return '<tr><td>'+t.id+'</td><td><strong>'+esc(t.title)+'</strong></td><td>'+esc(t.industry||'')+'</td><td>'+esc(t.base_price||'')+'</td><td><span class="pill">'+esc(t.status)+'</span></td><td>'+esc(t.sort_order||'')+'</td><td class="row-actions"><button class="btn-ghost" onclick="editTemplate('+t.id+')">编辑</button><button class="btn-danger" onclick="deleteTemplate('+t.id+')">删</button></td></tr>'}).join('')||'<tr><td colspan="7" class="muted">暂无模板</td></tr>'})}
function resetTemplateForm(){editingTemplateId=null;document.getElementById('templateFormTitle').textContent='新增模板';['title','industry','style_tags','cover_image','preview_video_url','duration','aspect_ratio','base_price','turnaround','difficulty','description'].forEach(function(k){document.getElementById('tpl_'+k).value='' });document.getElementById('tpl_status').value='published';document.getElementById('tpl_sort_order').value='99'}
function editTemplate(id){var t=templates.find(function(x){return x.id==id});if(!t)return;editingTemplateId=id;document.getElementById('templateFormTitle').textContent='编辑模板 #'+id;document.getElementById('tpl_title').value=t.title||'';document.getElementById('tpl_status').value=t.status||'published';document.getElementById('tpl_industry').value=t.industry||'';document.getElementById('tpl_style_tags').value=(t.style_tags||[]).join(', ');document.getElementById('tpl_cover_image').value=t.cover_image||'';document.getElementById('tpl_preview_video_url').value=t.preview_video_url||'';document.getElementById('tpl_duration').value=t.duration||'';document.getElementById('tpl_aspect_ratio').value=t.aspect_ratio||'';document.getElementById('tpl_base_price').value=t.base_price||'';document.getElementById('tpl_turnaround').value=t.turnaround||'';document.getElementById('tpl_difficulty').value=t.difficulty||'';document.getElementById('tpl_sort_order').value=t.sort_order||99;document.getElementById('tpl_description').value=t.description||''}
function saveTemplate(){var body={title:document.getElementById('tpl_title').value,status:document.getElementById('tpl_status').value,industry:document.getElementById('tpl_industry').value,style_tags:document.getElementById('tpl_style_tags').value,cover_image:document.getElementById('tpl_cover_image').value,preview_video_url:document.getElementById('tpl_preview_video_url').value,duration:document.getElementById('tpl_duration').value,aspect_ratio:document.getElementById('tpl_aspect_ratio').value,base_price:document.getElementById('tpl_base_price').value,turnaround:document.getElementById('tpl_turnaround').value,difficulty:document.getElementById('tpl_difficulty').value,sort_order:document.getElementById('tpl_sort_order').value,description:document.getElementById('tpl_description').value};var url=editingTemplateId?'/api/templates/admin/templates/'+editingTemplateId:'/api/templates/admin/templates';var method=editingTemplateId?'PUT':'POST';api(url,{method:method,body:JSON.stringify(body)}).then(function(d){if(d.success){resetTemplateForm();loadTemplates()}else alert(d.error||'保存失败')})}
function deleteTemplate(id){if(!confirm('确定删除模板？'))return;api('/api/templates/admin/templates/'+id,{method:'DELETE'}).then(function(d){if(d.success)loadTemplates()})}
</script>
</body>
</html>
